<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="only light" />
    <title>Aliens</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }
      html {
        color-scheme: only light;
        background: linear-gradient(to bottom, #1a0b2e 0%, #1a0b2e 50%, #2d5e6e 50%, #2d5e6e 100%);
      }
      body {
        /* Sky on top, ground on bottom; the world SVG with 'slice'
               always fills the viewport, but if a sub-pixel gap appears
               at the very edge (top or bottom) the body bg provides a
               same-color fallback so no seam is visible. */
        background: linear-gradient(to bottom, #1a0b2e 0%, #1a0b2e 50%, #2d5e6e 50%, #2d5e6e 100%);
        overflow: hidden;
      }
      /* Two stacked full-viewport SVGs:
           - .world uses 'slice' so the alien-planet world ALWAYS fills the
             viewport (cropped horizontally on tall/narrow screens, cropped
             vertically on very wide screens). The world viewBox is extended
             vertically (y=-500..1500) so cropping reveals more sky/ground
             rather than empty space.
           - .scene (aliens) uses 'meet' on top so all three aliens stay
             fully visible at every aspect ratio. */
      svg.world,
      svg.scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        background-color: transparent;
        forced-color-adjust: none;
        -webkit-forced-color-adjust: none;
        overflow: visible;
      }
      svg.world {
        z-index: 0;
      }
      svg.scene {
        z-index: 1;
        pointer-events: none;
      }

      /* Per-alien sway/breathe. Each alien root has class .alien-root
           and its own .body-anim child, with per-alien timing overrides
           for variety. */
      .alien-root {
        transform-box: fill-box;
        transform-origin: 50% 95%;
        animation: sway 6s ease-in-out infinite;
      }
      .alien-root.a1 {
        animation-duration: 6s;
      }
      .alien-root.a2 {
        animation-duration: 7s;
      }
      .alien-root.a3 {
        animation-duration: 6.5s;
      }
      @keyframes sway {
        0%,
        100% {
          transform: rotate(-1.4deg);
        }
        50% {
          transform: rotate(1.4deg);
        }
      }

      .body-anim {
        transform-box: fill-box;
        transform-origin: 50% 95%;
        animation: breathe 3.5s ease-in-out infinite;
      }
      .a1 .body-anim {
        animation-duration: 4s;
      }
      .a2 .body-anim {
        animation-duration: 3.5s;
      }
      .a3 .body-anim {
        animation-duration: 3.2s;
      }
      @keyframes breathe {
        0%,
        100% {
          transform: scale(1, 1);
        }
        50% {
          transform: scale(1.025, 1.02);
        }
      }

      .alien-root.twitch {
        animation:
          sway 6s ease-in-out infinite,
          shake 0.25s linear;
      }
      @keyframes shake {
        0%,
        100% {
          translate: 0 0;
        }
        20% {
          translate: -3px 1px;
        }
        40% {
          translate: 3px -2px;
        }
        60% {
          translate: -2px 2px;
        }
        80% {
          translate: 2px -1px;
        }
      }

      .eye-sclera,
      .pupil {
        forced-color-adjust: none;
        -webkit-forced-color-adjust: none;
      }

      /* World / background animations */
      .star {
        animation: twinkle 3s ease-in-out infinite;
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }
      #moon-big {
        transform-box: fill-box;
        transform-origin: center;
        animation: moon-drift 20s ease-in-out infinite;
      }
      #moon-small {
        transform-box: fill-box;
        transform-origin: center;
        animation: moon-drift 26s ease-in-out infinite reverse;
      }
      @keyframes moon-drift {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(0, -8px);
        }
      }
      .plant {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: plant-sway 5s ease-in-out infinite;
      }
      .plant.p2 {
        animation-duration: 6.3s;
        animation-delay: -1.2s;
      }
      .plant.p3 {
        animation-duration: 4.4s;
        animation-delay: -0.5s;
      }
      .plant.p4 {
        animation-duration: 5.7s;
        animation-delay: -2.1s;
      }
      .plant.p5 {
        animation-duration: 6.8s;
        animation-delay: -3.3s;
      }
      .plant.p6 {
        animation-duration: 4.9s;
        animation-delay: -0.8s;
      }
      @keyframes plant-sway {
        0%,
        100% {
          transform: rotate(-3deg);
        }
        50% {
          transform: rotate(3deg);
        }
      }

      /* Tiny moon orbits along the ring of the ringed planet.
           Position is computed in JS each frame (animateRingMoon) so it
           traces the ring's ellipse exactly. No CSS needed. */

      /* Shooting star: a small bright dot with a fading tail.
           Travels diagonally across the sky, then waits, then
           repeats. Position and opacity are driven by JS via SVG
           attributes; CSS sets default colors only.
           Note: do NOT set `opacity` on .shooting-star here, because a
           CSS opacity rule would override the SVG `opacity` attribute
           that JS animates. */
      .shooting-star .ss-head {
        fill: #ffffff;
      }
      .shooting-star .ss-tail {
        stroke: #ffffff;
        stroke-linecap: round;
        fill: none;
      }
    </style>
  </head>
  <body>
    <!-- World SVG: viewBox is the full extended world (y=-500..1500).
         Uses 'slice' so it always fills the viewport in both axes; on
         non-3:1 aspect ratios the world is cropped (revealing more sky
         or ground from the extended content) rather than letterboxed. -->
    <svg
      class="world"
      viewBox="0 -500 3000 2000"
      preserveAspectRatio="xMidYMid slice"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- ============================================================
             ALIEN WORLD BACKGROUND
             Layers (back to front):
               1. Sky band (top)
               2. Distant stars
               3. Two moons
               4. Far mountain silhouette
               5. Mid mountain silhouette
               6. Ground/terrain with craters
               7. Foreground alien plants

      <g id="world">

                 so any slice-overflow at the top stays sky color too. -->

        <rect x="0" y="520" width="3000" height="180" fill="#2a1148" opacity="0.7" />

          <circle class="star" cx="1340" cy="100" r="1.6" style="animation-delay: -0.9s" />
          <circle class="star" cx="1500" cy="200" r="2.6" style="animation-delay: -2.2s" />

          <circle class="star" cx="2280" cy="190" r="2.0" style="animation-delay: -0.3s" />
          <circle class="star" cx="2440" cy="130" r="1.8" style="animation-delay: -2.7s" />

          <!-- mid altitude stars -->
          <circle class="star" cx="180" cy="320" r="1.4" style="animation-delay: -0.8s" />

          <circle class="star" cx="160" cy="-220" r="1.7" style="animation-delay: -0.7s" />
          <circle class="star" cx="380" cy="-260" r="2.4" style="animation-delay: -2.5s" />
          <circle class="star" cx="600" cy="-200" r="1.5" style="animation-delay: -1.1s" />
          <circle class="star" cx="820" cy="-280" r="2.6" style="animation-delay: -0.3s" />

          <circle class="star" cx="1260" cy="-270" r="2.2" style="animation-delay: -1.6s" />
          <circle class="star" cx="1480" cy="-210" r="1.6" style="animation-delay: -0.9s" />
          <circle class="star" cx="1700" cy="-280" r="2.5" style="animation-delay: -2.4s" />
          <circle class="star" cx="1920" cy="-230" r="1.7" style="animation-delay: -1.3s" />
          <circle class="star" cx="2140" cy="-270" r="2.3" style="animation-delay: -0.5s" />
          <circle class="star" cx="2360" cy="-200" r="1.8" style="animation-delay: -2.1s" />
          <circle class="star" cx="2580" cy="-280" r="2.6" style="animation-delay: -1.5s" />
          <circle class="star" cx="2800" cy="-220" r="1.5" style="animation-delay: -0.7s" />

          <circle class="star" cx="100" cy="-380" r="2.0" style="animation-delay: -1.8s" />
          <circle class="star" cx="320" cy="-440" r="1.6" style="animation-delay: -0.4s" />
          <circle class="star" cx="540" cy="-380" r="2.4" style="animation-delay: -2.7s" />
          <circle class="star" cx="780" cy="-450" r="1.8" style="animation-delay: -1.2s" />
          <circle class="star" cx="1020" cy="-390" r="2.2" style="animation-delay: -0.6s" />
          <circle class="star" cx="1260" cy="-450" r="1.5" style="animation-delay: -2.3s" />
          <circle class="star" cx="1500" cy="-380" r="2.6" style="animation-delay: -1s" />
          <circle class="star" cx="1740" cy="-440" r="1.7" style="animation-delay: -2.5s" />
          <circle class="star" cx="1980" cy="-390" r="2.3" style="animation-delay: -0.8s" />
          <circle class="star" cx="2220" cy="-450" r="1.5" style="animation-delay: -2s" />

          <circle class="star" cx="2940" cy="-390" r="2.2" style="animation-delay: -2.2s" />
        </g>
        <!-- Extended cyan/yellow accent stars in extra sky -->
        <g stroke="none">
          <circle
            class="star"
            cx="500"
            cy="-60"
            r="2.5"

            style="animation-delay: -1.6s"

          <circle

            style="animation-delay: -2.6s"

        </g>

        <!-- 3. MOONS: a big pale moon between alien1 and alien2, small ringed moon between alien2 and alien3 -->
        <g id="moon-big">
          <circle cx="1050" cy="200" r="70" fill="#f3e1c7" stroke="#000" stroke-width="3" />
          <!-- moon craters -->
          <circle cx="1028" cy="180" r="10" fill="#cdb497" stroke="none" />
          <circle cx="1070" cy="220" r="14" fill="#cdb497" stroke="none" />
          <circle cx="1050" cy="175" r="6" fill="#cdb497" stroke="none" />
          <circle cx="1090" cy="180" r="8" fill="#cdb497" stroke="none" />
          <circle cx="1040" cy="225" r="7" fill="#cdb497" stroke="none" />
        </g>
        <g id="moon-small">
          <!-- ring (drawn first so moon overlaps it) -->
          <ellipse
            cx="1950"
            cy="180"
            rx="80"
            ry="14"
            fill="none"
            stroke="#a48ec9"
            stroke-width="3"
          />
          <ellipse cx="1950" cy="180" rx="80" ry="14" fill="none" stroke="#000" stroke-width="2" />
          <circle cx="1950" cy="180" r="40" fill="#d9b8e8" stroke="#000" stroke-width="3" />
          <circle cx="1940" cy="175" r="6" fill="#a87ec0" stroke="none" />
          <circle cx="1965" cy="190" r="8" fill="#a87ec0" stroke="none" />
        </g>
        <!-- Tiny moon orbiting along the ring of the ringed planet.
                 Position is updated each frame from JS so it traces the
                 ellipse exactly. Drawn after #moon-small so it sits on
                 top when in front, and we'll fade/scale it slightly when
                 behind to suggest depth. -->
        <circle
          id="ring-moon"
          cx="2030"
          cy="180"
          r="6"
          fill="#fff4d6"
          stroke="#000"
          stroke-width="2"
        />

        <!-- Shooting star: head + tail. Position and opacity driven
                 by JS so we can re-fire periodically along varied paths. -->
        <g id="shooting-star" class="shooting-star" opacity="0">
          <line class="ss-tail" x1="0" y1="0" x2="-90" y2="30" stroke-width="5" />
          <line
            class="ss-tail"
            x1="0"
            y1="0"
            x2="-60"
            y2="20"
            stroke-width="2.5"
            stroke="#ffe8a8"
          />
          <circle class="ss-head" cx="0" cy="0" r="5" />
          <circle class="ss-head" cx="0" cy="0" r="2" fill="#ffe8a8" />
        </g>

        <!-- 4. FAR MOUNTAIN SILHOUETTE: low rolling hills, dark purple -->
        <path
          fill="#3a1a5e"
          stroke="#000"
          stroke-width="3"
          d="
                M 0 700
                L 0 600

                C 800 580, 1000 520, 1200 540
                C 1400 560, 1600 510, 1800 540
                C 2000 570, 2200 530, 2400 550

        />

        <!-- 6. GROUND: foreground alien terrain, teal-magenta tinted dirt.
                 Extends below viewBox (to y=1500) so any slice-overflow at the
                 bottom of the viewport stays the ground color, never reveals

        <!-- solid base rect underneath the curved top, ensures total fill -->

        <!-- ground craters / ridges -->
        <g stroke="#0f3340" stroke-width="3" fill="none">
          <ellipse cx="320" cy="820" rx="60" ry="10" />

        <!-- ground texture dots -->
        <g fill="#1f4654" stroke="none">
          <circle cx="180" cy="880" r="6" />

    <script>
      // =================================================================
      // Shared helpers
      // =================================================================
      function S(c1x, c1y, c2x, c2y, px, py) {
        return { c1: { x: c1x, y: c1y }, c2: { x: c2x, y: c2y }, p: { x: px, y: py } };
      }
      function emitSegments(arr, d) {
        for (const seg of arr) {
          d += ` C${seg.c1.x.toFixed(2)},${seg.c1.y.toFixed(2)} ${seg.c2.x.toFixed(2)},${seg.c2.y.toFixed(2)} ${seg.p.x.toFixed(2)},${seg.p.y.toFixed(2)}`;
        }
        return d;
      }
      function smoothPathSuffix(points) {
        let d = "";
        for (let i = 0; i < points.length - 1; i++) {
          const p0 = points[i - 1] || points[i];
          const p1 = points[i];
          const p2 = points[i + 1];
          const p3 = points[i + 2] || p2;
          const c1x = p1.x + (p2.x - p0.x) / 6;
          const c1y = p1.y + (p2.y - p0.y) / 6;
          const c2x = p2.x - (p3.x - p1.x) / 6;
          const c2y = p2.y - (p3.y - p1.y) / 6;
          d += ` C${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;
        }
        return d;
      }
      function smoothD(points) {
        if (points.length < 2) return "";
        let d = `M${points[0].x.toFixed(2)},${points[0].y.toFixed(2)}`;
        return d + smoothPathSuffix(points);
      }
      function buildAppendageSuffix(def, nowSec) {
        const base = {
          x: (def.entry.x + def.exit.x) / 2,
          y: (def.entry.y + def.exit.y) / 2,
        };
        const ax = def.axis.x,
          ay = def.axis.y;
        const px = -ay,
          py = ax;
        const cl = def.points.map((p, i) => {
          const ramp =
            def.wave.rampStart + (1 - def.wave.rampStart) * (i / (def.points.length - 1));
          const wavePhase = def.wave.phase + i * def.wave.phaseDelay;
          const wave =
            Math.sin(nowSec * def.wave.freq * 2 * Math.PI + wavePhase) * def.wave.amp * ramp;
          const lateral = p.lat + wave;
          return {
            x: base.x + ax * p.d + px * lateral,
            y: base.y + ay * p.d + py * lateral,
            th: p.th,
          };
        });
        function tangentAt(i) {
          const a = cl[Math.max(0, i - 1)];
          const b = cl[Math.min(cl.length - 1, i + 1)];
          const tx = b.x - a.x,
            ty = b.y - a.y;
          const len = Math.hypot(tx, ty) || 1;
          return { x: tx / len, y: ty / len };
        }
        const topEdge = [def.entry];
        for (let i = 0; i < cl.length; i++) {
          const t = tangentAt(i);
          const nx = t.y,
            ny = -t.x;
          topEdge.push({ x: cl[i].x + nx * (cl[i].th / 2), y: cl[i].y + ny * (cl[i].th / 2) });
        }
        const bottomEdge = [];
        for (let i = cl.length - 1; i >= 0; i--) {
          const t = tangentAt(i);
          const nx = t.y,
            ny = -t.x;
          bottomEdge.push({ x: cl[i].x - nx * (cl[i].th / 2), y: cl[i].y - ny * (cl[i].th / 2) });
        }
        bottomEdge.push(def.exit);
        const tipPt = cl[cl.length - 1];
        const tipT = tangentAt(cl.length - 1);
        const capPt = {
          x: tipPt.x + tipT.x * (tipPt.th / 2),
          y: tipPt.y + tipT.y * (tipPt.th / 2),
        };
        return smoothPathSuffix([...topEdge, capPt, ...bottomEdge]);
      }

          ay = def.axis.y;

        const idxF = frac * (n - 1);
        const i0 = Math.floor(idxF);
        const i1 = Math.min(n - 1, i0 + 1);
        const t = idxF - i0;

          const p = def.points[i];
          const ramp = def.wave.rampStart + (1 - def.wave.rampStart) * (i / (n - 1));

            Math.sin(nowSec * def.wave.freq * 2 * Math.PI + wavePhase) * def.wave.amp * ramp;

      //   The center of the viewBox is x=1500, y=500 and slice maps that

      //

      //   uniform scale Sa = min(vw/3000, vh/1000)
      //   The viewBox center is y=500 mapped to viewport center, so y=755

      // ===================================================================

      // Tiny moon orbits along the ring of the ringed planet.
      // Ring center (1950, 180), rx=80, ry=14. Use angle to compute
      // position. To suggest depth, scale the moon slightly smaller when
      // it's on the far side (top half of orbit, since the ring is viewed
      // edge-on with a slight tilt) and slightly larger on the near side.
      // ===================================================================
      const ringMoonEl = document.getElementById("ring-moon");
      const RING_CX = 1950,
        RING_CY = 180,
        RING_RX = 80,
        RING_RY = 14;
      function animateRingMoon(nowSec) {
        // Period: ~6 seconds per orbit.
        const angle = (nowSec / 6) * Math.PI * 2;
        const x = RING_CX + Math.cos(angle) * RING_RX;
        const y = RING_CY + Math.sin(angle) * RING_RY;
        // Far side of orbit when sin(angle) < 0 (top half: ring tilts so
        // bottom is in front of the planet, top is behind).
        const onFarSide = Math.sin(angle) < 0;
        // Hide entirely when behind the planet disk: on far side AND
        // within the planet's projected radius.
        const PLANET_R = 40;
        const dx = x - RING_CX;
        const behind = onFarSide && Math.abs(dx) < PLANET_R;
        // Near side gets larger and brighter; far side smaller and faded.
        const nearness = (Math.sin(angle) + 1) / 2; // 0..1
        const r = 4 + nearness * 3; // 4..7
        const opacity = behind ? 0 : 0.55 + nearness * 0.45;
        ringMoonEl.setAttribute("cx", x.toFixed(2));
        ringMoonEl.setAttribute("cy", y.toFixed(2));
        ringMoonEl.setAttribute("r", r.toFixed(2));
        ringMoonEl.setAttribute("opacity", opacity.toFixed(2));
      }

      // ===================================================================
      // Shooting star: occasional diagonal streak across the sky.
      // Each run picks a random start point near the top of the sky
      // (world coords: x in 100..900 or 2100..2900, y in -200..100) and a
      // shallow downward direction (left-to-right or right-to-left). The
      // streak lasts ~0.8-1.2s with fade in/out, then waits 6-14s before
      // the next one.
      // ===================================================================
      const shootingStar = document.getElementById("shooting-star");
      const ssTails = shootingStar.querySelectorAll(".ss-tail");
      let ssState = null;
      function scheduleShootingStar() {
        const wait = 6000 + Math.random() * 8000;
        setTimeout(launchShootingStar, wait);
      }
      function launchShootingStar() {
        const dir = Math.random() < 0.5 ? 1 : -1;
        const startX = dir === 1 ? 100 + Math.random() * 800 : 2100 + Math.random() * 800;
        const startY = -200 + Math.random() * 300; // between -200 and 100
        const dist = 700 + Math.random() * 400;
        const angleDeg = 18 + Math.random() * 14; // shallow downward
        const rad = (angleDeg * Math.PI) / 180;
        const dx = Math.cos(rad) * dist * dir;
        const dy = Math.sin(rad) * dist;
        const endX = startX + dx;
        const endY = startY + dy;
        // Tails point opposite to motion direction. Outer tail is longer/wider.
        const outerLen = 100;
        const innerLen = 60;
        const tdx = -Math.cos(rad) * dir;
        const tdy = -Math.sin(rad);
        ssTails[0].setAttribute("x2", (tdx * outerLen).toFixed(2));
        ssTails[0].setAttribute("y2", (tdy * outerLen).toFixed(2));
        ssTails[1].setAttribute("x2", (tdx * innerLen).toFixed(2));
        ssTails[1].setAttribute("y2", (tdy * innerLen).toFixed(2));
        ssState = {
          startTime: performance.now(),
          duration: 800 + Math.random() * 400,
          startX,
          startY,
          endX,
          endY,
        };
      }
      function animateShootingStar(nowMs) {
        if (!ssState) return;
        const t = (nowMs - ssState.startTime) / ssState.duration;
        if (t >= 1) {
          shootingStar.setAttribute("opacity", "0");
          ssState = null;
          scheduleShootingStar();
          return;
        }
        const x = ssState.startX + (ssState.endX - ssState.startX) * t;
        const y = ssState.startY + (ssState.endY - ssState.startY) * t;
        // Fade in fast, fade out toward the end.
        let op;
        if (t < 0.15) op = t / 0.15;
        else if (t > 0.75) op = (1 - t) / 0.25;
        else op = 1;
        shootingStar.setAttribute("opacity", op.toFixed(2));
        shootingStar.setAttribute("transform", `translate(${x.toFixed(2)} ${y.toFixed(2)})`);
      }
      scheduleShootingStar();

      // Drive both from rAF.
      function skyFrame(ts) {
        animateRingMoon(ts / 1000);
        animateShootingStar(ts);
        requestAnimationFrame(skyFrame);
      }
      requestAnimationFrame(skyFrame);
    </script>
  </body>
</html>
